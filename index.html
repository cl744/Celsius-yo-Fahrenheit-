<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }
        .converter-box {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 350px;
            width: 100%;
        }
        select, input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .result {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>

<div class="converter-box">
    <h2>Temperature Converter</h2>
    
    <label for="conversionType">Choose conversion:</label>
    <select id="conversionType" onchange="convertTemperature()">
        <option value="cToF">Celsius to Fahrenheit (°C → °F)</option>
        <option value="fToC">Fahrenheit to Celsius (°F → °C)</option>
        <option value="kToC">Kelvin to Celsius (K → °C)</option>
        <option value="kToF">Kelvin to Fahrenheit (K → °F)</option>
        <option value="fToK">Fahrenheit to Kelvin (°F → K)</option>
        <option value="cToK">Celsius to Kelvin (°C → K)</option>
    </select>

    <input type="number" id="tempInput" placeholder="Enter temperature" oninput="convertTemperature()">
    
    <div class="result" id="result">
        Result: --
    </div>
</div>

<script>
function convertTemperature() {
    let inputVal = document.getElementById("tempInput").value;
    let conversionType = document.getElementById("conversionType").value;
    let resultDiv = document.getElementById("result");

    // If input is empty, clear the result
    if (inputVal === "") {
        resultDiv.innerHTML = "Result: --";
        return;
    }

    let temp = parseFloat(inputVal);
    let finalResult = 0;
    let unit = "";

    switch (conversionType) {
        case "cToF":
            finalResult = (temp * 1.8) + 32;
            unit = "°F";
            break;
        case "fToC":
            finalResult = (temp - 32) / 1.8;
            unit = "°C";
            break;
        case "kToC":
            finalResult = temp - 273.15;
            unit = "°C";
            break;
        case "kToF":
            finalResult = ((temp - 273.15) * 1.8) + 32;
            unit = "°F";
            break;
        case "fToK":
            finalResult = ((temp - 32) / 1.8) + 273.15;
            unit = "K";
            break;
        case "cToK":
            finalResult = temp + 273.15;
            unit = "K";
            break;
    }

    // Display the result rounded to two decimal places
    resultDiv.innerHTML = `Result: ${finalResult.toFixed(2)} ${unit}`;
}
</script>

</body>
</html>
